<!DOCTYPE html>
<html>
<head>
<title>Admin - Sensipro Elite</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="container">

<h1>Admin</h1>

<input id="senha" placeholder="Senha admin">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h2>Gerar Código</h2>
<button onclick="gerarCodigo()">Gerar</button>

<p id="codigoGerado"></p>

</div>

</div>

<script src="config.js"></script>

<script>

function login(){
const senha = document.getElementById("senha").value;

if(senha === "123456"){
document.getElementById("painel").style.display = "block";
}
}

async function gerarCodigo(){

const codigo = "SENSI-" + Math.random().toString(36).substring(2,8).toUpperCase();

await supabaseClient
.from("codigos")
.insert({
codigo: codigo,
tipo: "vip"
});

document.getElementById("codigoGerado").innerText = codigo;
}

</script>

</body>
</html>
