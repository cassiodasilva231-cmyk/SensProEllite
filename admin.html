<!DOCTYPE html>
<html>
<head>
<title>Painel ADM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Painel Admin</h1>

<select id="tipo">
<option value="mensal">Mensal</option>
<option value="vitalicio">Vitalício</option>
</select>

<button onclick="criarCodigo()">Criar código</button>

<p id="novoCodigo"></p>

<script>

const supabase = supabase.createClient(
"https://zrsyfkjmykgkloztgili.supabase.co",
"COLE_AQUI_SUA_PUBLISHABLE_KEY"
)

function gerarCodigo(){
return "VIP-" + Math.random().toString(36).substring(2,8).toUpperCase()
}

async function criarCodigo(){

let codigo = gerarCodigo()
let tipo = document.getElementById("tipo").value

await supabase
.from("codigos")
.insert([{codigo:codigo, tipo:tipo, usado:false}])

document.getElementById("novoCodigo").innerHTML = codigo

}

</script>

</body>
</html>
